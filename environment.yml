# Environment for cjm-transcription-capability-voxtral-hf
# Provides Voxtral via Hugging Face Transformers with PyTorch CUDA support
name: cjm-capability-voxtral-hf
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  # Python version
  - python=3.12

  # System dependencies (conda-managed for proper linking)
  - ffmpeg

  # Pip dependencies
  - pip
  - pip:
    # PyTorch with CUDA (adjust for target cuda version as needed)
    - torch
    - torchaudio

    # Result data noun (TranscriptionResult). Substrate (cjm-substrate) is
    # AUTO-INJECTED by `cjm-ctl install-all` (schema v2), so it is no longer
    # listed here — same reason it was dropped from capabilitys.yaml interface_libs.
    - cjm-capability-primitives

    # Shared hf helpers for capabilitys
    - cjm-substrate-hf-utils

    # Voxtral/Transformers dependencies
    - "transformers<5"
    - accelerate
    - librosa
    - mistral-common[audio]

    # Audio processing
    - soundfile
    - numpy

    # Utilities
    - fastcore

    # Worker dependencies (FastAPI, uvicorn, psutil, httpx)
    - fastapi
    - uvicorn
    - psutil
    - httpx
